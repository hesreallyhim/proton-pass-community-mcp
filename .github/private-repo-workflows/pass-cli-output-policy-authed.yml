name: Pass CLI Output Policy (Authed)

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  output-policy-check:
    name: Authenticated Output Policy Drift Check
    runs-on: ubuntu-latest
    env:
      PROTON_PASS_KEY_PROVIDER: env
      PROTON_PASS_ENCRYPTION_KEY: ${{ secrets.PROTON_PASS_ENCRYPTION_KEY }}
      PASS_DEV_EXPECTED_ACCOUNT: ${{ secrets.PROTON_PASS_EXPECTED_ACCOUNT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure throwaway session directory
        run: |
          echo "PROTON_PASS_SESSION_DIR=${RUNNER_TEMP}/proton-pass-dev-session" >> "$GITHUB_ENV"
          mkdir -p "${RUNNER_TEMP}/proton-pass-dev-session"

      - name: Install pass-cli
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq
          curl -fsSL https://proton.me/download/pass-cli/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify pass-cli installation
        run: pass-cli --version

      - name: Authenticate pass-cli session
        env:
          PROTON_PASS_PASSWORD: ${{ secrets.PROTON_PASS_PASSWORD }}
          PROTON_PASS_TOTP: ${{ secrets.PROTON_PASS_TOTP }}
          PROTON_PASS_EXTRA_PASSWORD: ${{ secrets.PROTON_PASS_EXTRA_PASSWORD }}
        run: scripts/pass-dev.sh login --interactive "${{ secrets.PROTON_PASS_USERNAME }}"

      - name: Account preflight and auth smoke
        run: |
          npm run pass:dev:preflight
          npm run pass:dev:info

      - name: Check output-policy table drift
        run: npm run pass:dev:output-policy:check

      - name: Logout pass-cli session
        if: always()
        run: scripts/pass-dev.sh logout --force || true
