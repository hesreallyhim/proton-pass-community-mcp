name: Production Hygiene

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  production-hygiene:
    name: Debug Logging Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production hygiene warnings
        run: npm run check:production-hygiene

      - name: Enforce production hygiene on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run check:production-hygiene -- --enforce
