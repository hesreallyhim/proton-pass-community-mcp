name: Conventional PR Title

on:
  pull_request:
    branches:
      - main
      - "v*"
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: read

jobs:
  semantic-pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Enforce Conventional Commits PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
