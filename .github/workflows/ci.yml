name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate complexity report
        run: |
          mkdir -p .tmp
          npm run analyze:complexity -- src --json-out .tmp/complexity-report.json

      - name: Complexity threshold warnings
        run: npm run check:complexity-thresholds -- --report .tmp/complexity-report.json

      - name: Enforce complexity thresholds on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run check:complexity-thresholds -- --report .tmp/complexity-report.json --enforce

      - name: Run checks
        run: npm run check
